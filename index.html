<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物品庫存管理</title>
    <link rel="stylesheet" href="dist/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- 首頁大圖+搜尋區塊 -->
        <header class="hero-section" id="heroSection">
            <div class="hero-image">
                <img src="dist/img/hero-image.png" alt="庫存管理" class="hero-img">
                <div class="hero-overlay">
                    <h1 class="hero-title">物品庫存管理</h1>
                    <p class="hero-subtitle">輕鬆管理您的物品庫存</p>
                </div>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋物品名稱、標籤或場景..." class="search-input">
                    <button class="search-btn" id="searchBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- 首頁 Page -->
            <div id="homePage" class="page active">
                <!-- Scenes Section -->
                <div class="section-container">
                    <div class="section-item">
                        <div class="section-header">
                            <h2 class="section-title">場景</h2>
                            <button class="view-all-btn" data-page="scenes">查看全部</button>
                        </div>
                        <div class="horizontal-scroll-container" id="scenesScrollContainer">
                            <div class="horizontal-scroll-content" id="scenesScrollContent">
                                <!-- Scenes cards will be populated here -->
                            </div>
                        </div>
                    </div>
                    <!-- Tags Section -->
                    <div class="section-item">
                        <div class="section-header">
                            <h2 class="section-title">標籤</h2>
                            <button class="view-all-btn" data-page="tags">查看全部</button>
                        </div>
                        <div class="horizontal-scroll-container" id="tagsScrollContainer">
                            <div class="horizontal-scroll-content" id="tagsScrollContent">
                                <!-- Tags cards will be populated here -->
                            </div>
                        </div>
                    </div>
                    <!-- New Section -->
                    <div class="section-item">
                        <div class="section-header">
                            <h2 class="section-title">最近更新</h2>
                        </div>
                        <div id="recentItemsList" class="items-list">
                            <!-- Recent items will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
            <!-- 場景列表Scenes Page -->
            <div id="scenesPage" class="page">
                <div class="page-header">
                    <button class="back-btn" id="scenesBackBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>場景管理</h2>
                    <button class="add-btn" id="addSceneBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div id="scenesList" class="scenes-list">
                    <!-- Scenes will be populated here -->
                </div>
            </div>
            <!--場景詳情頁-->
            <div id="scenesDetailPage" class="page">
                <div class="page-header">
                    <button class="back-btn" id="scenesDetailBackBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>場景詳細頁</h2>
                    <button class="add-btn" id="addSceneBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div id="scenesDetailLocations" class="detail-section"></div>
                <div id="scenesDetailItems" class="detail-section"></div>
            </div>
            <!-- 物品列表item Page -->
            <div id="itemsPage" class="page">
                <div class="page-header">
                    <button class="back-btn" id="itemsBackBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>物品</h2>
                    <button class="add-btn" id="addItemPageBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="itemsSearchInput" placeholder="搜尋物品、場景、標籤">
                        <button type="button" id="itemsSearchBtn">搜尋</button>
                    </div>
                </div>
                <div id="itemsList" class="items-list"></div>
            </div>
            <!--物品詳情頁-->
            <div id="itemDetailPage" class="page">
                <div class="page-header">
                    <button type="button" id="itemDetailBackBtn" class="back-btn">返回</button>
                    <h2 id="itemDetailTitle">物品詳情</h2>
                </div>
                <div class="page-header">
                    <h2>物品</h2>
                    <button type="button" class="primary-btn" id="addItemPageBtn">新增物品</button>
                </div>
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="itemsSearchInput" placeholder="搜尋物品、場景、標籤">
                        <button type="button" id="itemsSearchBtn">搜尋</button>
                    </div>
                </div>
                <div id="itemDetailContent" class="detail-section"></div>
            </div>
            <!-- 標籤列表Tags Page -->
            <div id="tagsPage" class="page">
                <div class="page-header">
                    <button class="back-btn" id="tagsBackBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>標籤管理</h2>
                    <button class="add-btn" id="addTagBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div id="tagsList" class="tags-list">
                    <!-- Tags will be populated here -->
                </div>
            </div>
            <!--標籤詳情頁-->
            <div id="tagDetailPage" class="page">
                <div class="page-header">
                    <button class="back-btn" id="tagDetailBackBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2>標籤詳細頁</h2>
                    <button class="add-btn" id="addTagBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div id="tagDetailItems" class="detail-section"></div>
            </div>
            <!-- 添加場景Modal -->
            <div id="addSceneModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加場景</h3>
                        <button class="close-btn" id="closeSceneModalBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <form id="addSceneForm" class="form">
                        <div class="form-group">
                            <label for="sceneName">場景名稱</label>
                            <input type="text" id="sceneName" required>
                        </div>
                        <div class="form-group">
                            <label for="sceneLocations">地點名稱（用逗號分隔）</label>
                            <input type="text" id="sceneLocations" placeholder="例如：電視櫃, 沙發旁, 茶几" required>
                        </div>
                        <button type="submit" class="btn btn-primary">確認新增</button>
                    </form>
                </div>
            </div>
            <!-- 添加標籤Modal -->
            <div id="addTagModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加標籤</h3>
                        <button class="close-btn" id="closeTagModalBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <form id="addTagForm" class="form">
                        <div class="form-group">
                            <label for="tagName">標籤名稱</label>
                            <input type="text" id="tagName" required>
                        </div>
                        <div class="form-group">
                            <label for="tagColor">標籤顏色</label>
                            <input type="color" id="tagColor" value="#3B82F6">
                        </div>
                        <button type="submit" class="btn btn-primary">確認新增</button>
                    </form>
                </div>
            </div>
            <!-- 添加物品Add Item Modal -->
            <div id="addItemModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加物品</h3>
                        <button class="close-btn" id="closeModalBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <form id="addItemForm" class="form">
                        <div class="form-group">
                            <label for="itemName">物品名稱</label>
                            <input type="text" id="itemName" required>
                        </div>
                        <div class="form-group">
                            <label for="itemQuantity">數量</label>
                            <input type="number" id="itemQuantity" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="itemScene">場景</label>
                            <select id="itemScene" required>
                                <option value="">選擇場景</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="itemLocation">地點</label>
                            <select id="itemLocation" required>
                                <option value="">先選擇場景</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="itemTags">標籤</label>
                            <div id="itemTags" class="tags-selector">
                                <!-- Tags checkboxes will be populated here -->
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="itemExpiry">保存期限</label>
                            <input type="date" id="itemExpiry">
                        </div>
                        <div class="form-group">
                            <label for="itemPhoto">照片</label>
                            <input type="file" id="itemPhoto" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary">添加物品</button>
                    </form>
                </div>
            </div>
            <!-- 我的頁面Profile Page -->
            <div id="profilePage" class="page">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <h2 class="profile-name">使用者</h2>
                        <p class="profile-email">user@example.com</p>
                    </div>
                </div>
                <div class="profile-section">
                    <h3 class="section-subtitle">設置相關</h3>
                    <div class="profile-menu">
                        <button class="menu-item">
                            <span class="menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34l4.24-4.24m11.56 5.66l-4.24-4.24M6.34 17.66l4.24 4.24m11.56-5.66l-4.24 4.24"></path>
                                </svg>
                            </span>
                            <span class="menu-text">通知設置</span>
                            <span class="menu-arrow">›</span>
                        </button>
                        <button class="menu-item">
                            <span class="menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                </svg>
                            </span>
                            <span class="menu-text">數據備份</span>
                            <span class="menu-arrow">›</span>
                        </button>
                        <button class="menu-item">
                            <span class="menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </span>
                            <span class="menu-text">關於應用</span>
                            <span class="menu-arrow">›</span>
                        </button>
                        <button class="menu-item">
                            <span class="menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 11H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h4"></path>
                                    <path d="M15 13h4a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-4"></path>
                                    <path d="M12 3v18"></path>
                                    <path d="M7 8h10"></path>
                                    <path d="M7 16h10"></path>
                                </svg>
                            </span>
                            <span class="menu-text">語言設置</span>
                            <span class="menu-arrow">›</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
        <!-- 底部導覽欄Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>首頁</span>
            </button>
            <button class="nav-item" data-page="scenes">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span>場景</span>
            </button>
            <button class="nav-item" data-page="items">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 7L12 3L4 7L12 11L20 7Z"></path>
                    <path d="M4 7V17L12 21L20 17V7"></path>
                </svg>
                <span>物品</span>
            </button>
            <button class="nav-item" data-page="tags">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 8V2h6l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                </svg>
                <span>標籤</span>
            </button>
            <button class="nav-item" data-page="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>我的</span>
            </button>
        </nav>
        <!--             <button class="nav-item add-item-btn" id="addItemNavBtn">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button> -->
    </div>
    <script src="dist/js/app.js"></script>
</body>

</html>
